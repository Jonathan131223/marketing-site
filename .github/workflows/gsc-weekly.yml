name: GSC weekly report

# Runs every Monday at 09:00 UTC (≈ 11:00 Paris). Also manually triggerable
# via the "Actions" tab → "Run workflow" for on-demand reports.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   GSC_CLIENT_ID        OAuth client ID from ~/.gsc-client-secret.json
#   GSC_CLIENT_SECRET    OAuth client secret from ~/.gsc-client-secret.json
#   GSC_REFRESH_TOKEN    refresh_token from ~/.gsc-token.json
#   RESEND_API_KEY       same key the contact form uses (already in Vercel)
#
# The workflow commits the updated `scripts/gsc/last-run.json` snapshot back
# to main so the following week's diff has a clean comparison point.

on:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday 09:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write       # to commit the updated last-run.json snapshot

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci --no-audit --no-fund

      - name: Generate + send weekly report
        env:
          GSC_CLIENT_ID:     ${{ secrets.GSC_CLIENT_ID }}
          GSC_CLIENT_SECRET: ${{ secrets.GSC_CLIENT_SECRET }}
          GSC_REFRESH_TOKEN: ${{ secrets.GSC_REFRESH_TOKEN }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          REPORT_TO:         jonathan@digistorms.ai
        run: node scripts/gsc/weekly-report.mjs

      - name: Commit rolling snapshot for next week's diff
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain scripts/gsc/last-run.json)" ]; then
            git add scripts/gsc/last-run.json
            git commit -m "chore(gsc): weekly snapshot $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No snapshot changes to commit."
          fi
